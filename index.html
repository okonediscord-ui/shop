<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILPHARMA BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0010;
    --bg2: #150018;
    --bg3: #1C0022;
    --card: #1A001F;
    --purple-deep: #3D005C;
    --purple-mid: #7B00B4;
    --purple-light: #B44FFF;
    --purple-glow: #D080FF;
    --lean: #4B0082;
    --syrup: #9B0026;
    --syrup-glow: #FF3366;
    --white: #F0E6FF;
    --muted: #8A6B9A;
    --border: rgba(180,79,255,0.15);
    --border-hover: rgba(180,79,255,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Animated bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(100,0,160,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 400px 600px at 80% 20%, rgba(155,0,38,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 60% 80%, rgba(123,0,180,0.14) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,0,16,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--purple-glow), var(--syrup-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -4px;
    -webkit-text-fill-color: var(--muted);
  }

  .cart-btn {
    position: relative;
    background: rgba(123,0,180,0.2);
    border: 1px solid var(--border-hover);
    color: var(--purple-light);
    width: 46px;
    height: 46px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 18px;
  }
  .cart-btn:hover {
    background: rgba(123,0,180,0.4);
    border-color: var(--purple-light);
    box-shadow: 0 0 16px rgba(180,79,255,0.3);
  }
  .cart-count {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--syrup-glow);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--bg);
    display: none;
  }
  .cart-count.visible { display: flex; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px 40px;
  }
  .hero-tag {
    display: inline-block;
    background: rgba(155,0,38,0.25);
    border: 1px solid rgba(255,51,102,0.3);
    color: var(--syrup-glow);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 0.06em;
    line-height: 0.9;
    background: linear-gradient(180deg, var(--white) 0%, var(--purple-glow) 60%, var(--purple-mid) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .hero p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  /* ── FILTERS ── */
  .filters {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 8px;
    padding: 0 28px 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--purple-light); color: var(--purple-light); }
  .filter-btn.active {
    background: rgba(123,0,180,0.3);
    border-color: var(--purple-light);
    color: var(--purple-glow);
    box-shadow: 0 0 12px rgba(180,79,255,0.2);
  }

  /* ── GRID ── */
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    padding: 0 28px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    animation: cardIn 0.5s ease both;
    cursor: pointer;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(123,0,180,0.25), 0 0 0 1px rgba(180,79,255,0.2);
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(20px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .card-img {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--bg3);
  }
  .card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
    filter: saturate(0.85);
  }
  .card:hover .card-img img { transform: scale(1.07); filter: saturate(1.1); }

  .card-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(13,0,16,0.7) 0%, transparent 50%);
    pointer-events: none;
  }

  .badge {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-new    { background: rgba(75,0,130,0.8);  color: var(--purple-glow); border: 1px solid rgba(180,79,255,0.4); }
  .badge-hot    { background: rgba(155,0,38,0.8);  color: #FF8099;            border: 1px solid rgba(255,51,102,0.4); }
  .badge-soldout{ background: rgba(30,30,30,0.8);  color: #888;               border: 1px solid rgba(255,255,255,0.1); }

  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-cat {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--purple-light);
    opacity: 0.7;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--white);
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.65;
    margin-top: 2px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .price {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--purple-glow), var(--syrup-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .add-btn {
    background: rgba(123,0,180,0.25);
    border: 1px solid rgba(180,79,255,0.35);
    color: var(--purple-light);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-btn:hover {
    background: rgba(123,0,180,0.5);
    border-color: var(--purple-light);
    box-shadow: 0 0 16px rgba(180,79,255,0.25);
    color: var(--purple-glow);
  }
  .add-btn.added {
    background: rgba(155,0,38,0.3);
    border-color: var(--syrup-glow);
    color: var(--syrup-glow);
  }
  .add-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
  }

  /* ── CART PANEL ── */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(440px, 100vw);
    background: var(--bg2);
    border-left: 1px solid var(--border-hover);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--purple-glow), var(--syrup-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .close-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .close-btn:hover { border-color: var(--syrup-glow); color: var(--syrup-glow); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-track { background: transparent; }
  .cart-items::-webkit-scrollbar-thumb { background: var(--purple-deep); border-radius: 2px; }

  .cart-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .cart-empty-icon { font-size: 48px; opacity: 0.4; }

  .cart-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(12px); } to { opacity:1; transform:none; } }

  .cart-item-img {
    width: 60px; height: 60px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    filter: saturate(0.8);
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--white);
  }
  .cart-item-price {
    font-size: 14px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--purple-glow), var(--syrup-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 3px;
  }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .qty-btn {
    background: rgba(123,0,180,0.2);
    border: 1px solid var(--border);
    color: var(--purple-light);
    width: 24px; height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--purple-light); background: rgba(123,0,180,0.4); }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 16px; text-align: center; }
  .remove-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 4px;
  }
  .remove-btn:hover { opacity: 1; color: var(--syrup-glow); }

  /* ── CART FOOTER ── */
  .cart-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .cart-total-label { color: var(--muted); }
  .cart-total-amount {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--purple-glow), var(--syrup-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .note-field {
    background: rgba(123,0,180,0.08);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    height: 64px;
  }
  .note-field::placeholder { color: var(--muted); }
  .note-field:focus { border-color: var(--purple-light); }

  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple-mid), var(--lean));
    border: 1px solid rgba(180,79,255,0.4);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(123,0,180,0.35);
  }
  .checkout-btn:hover {
    background: linear-gradient(135deg, var(--purple-light), var(--purple-mid));
    box-shadow: 0 8px 32px rgba(180,79,255,0.45);
    transform: translateY(-1px);
  }
  .checkout-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(28,0,34,0.95);
    border: 1px solid var(--border-hover);
    color: var(--purple-glow);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(123,0,180,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grid { padding: 0 16px 80px; }
    header { padding: 0 16px; }
    .filters { padding: 0 16px 24px; }
  }
</style>
</head>

let cart = [];

function getBadgeHTML(badge) {
  if (!badge) return '';
  const map = { new: 'badge-new', hot: 'badge-hot' };
  const labels = { new: '✦ Nouveau', hot: '🔥 Populaire' };
  return `<span class="badge ${map[badge]}">${labels[badge]}</span>`;
}

function renderGrid(items) {
  document.getElementById('grid').innerHTML = items.map((p, i) => `
    <div class="card" data-cat="${p.cat}" style="animation-delay:${i*0.06}s">
      <div class="card-img">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="card-img-overlay"></div>
        ${getBadgeHTML(p.badge)}
      </div>
      <div class="card-body">
        <span class="card-cat">${p.cat}</span>
        <div class="card-name">${p.name}</div>
        <p class="card-desc">${p.desc}</p>
        <div class="card-footer">
          <div class="price">${p.price} €</div>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">
            <span>+ Panier</span>
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function filter(cat, el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const items = cat === 'all' ? products : products.filter(p => p.cat === cat);
  renderGrid(items);
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...p, qty: 1 });
    const btn = document.getElementById('btn-'+id);
    if (btn) { btn.classList.add('added'); btn.querySelector('span').textContent = '✓ Ajouté'; }
  }
  updateCartCount();
  showToast(`${p.name} ajouté au panier`);
  renderCartItems();
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  const btn = document.getElementById('btn-'+id);
  if (btn) { btn.classList.remove('added'); btn.querySelector('span').textContent = '+ Panier'; }
  updateCartCount();
  renderCartItems();
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeFromCart(id); return; }
  renderCartItems();
  updateCartCount();
}

function updateCartCount() {
  const total = cart.reduce((s, x) => s + x.qty, 0);
  const el = document.getElementById('cart-count');
  el.textContent = total;
  el.classList.toggle('visible', total > 0);
}

function renderCartItems() {
  const container = document.getElementById('cart-items');
  const footer = document.getElementById('cart-footer');
  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>Ton panier est vide.<br>Ajoute des produits au catalogue.</div></div>`;
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'flex';
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.img}" alt="${item.name}">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.price * item.qty} €</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},+1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
    </div>
  `).join('');
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  document.getElementById('cart-total').textContent = total + ' €';
}

function buildTgLink() {
  const note = document.getElementById('cart-note').value.trim();
  const lines = cart.map(x => `• ${x.name} x${x.qty} — ${x.price * x.qty} €`);
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  let msg = `🛒 COMMANDE SYZURP SHOP\n\n${lines.join('\n')}\n\n💜 Total : ${total} €`;
  if (note) msg += `\n\n📝 Note : ${note}`;
  document.getElementById('checkout-link').href = `https://t.me/${TELEGRAM}?text=${encodeURIComponent(msg)}`;
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
  renderCartItems();
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
renderGrid(products);
</script>
