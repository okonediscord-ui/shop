<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Boutique</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #17171d;
      --surface2: #1e1e26;
      --border: #2a2a35;
      --accent: #7c5cfc;
      --accent2: #e85d9a;
      --success: #22d07a;
      --warning: #f5a623;
      --danger: #ff4d6d;
      --text: #f0f0f5;
      --text2: #8888a0;
      --radius: 16px;
      --tg-theme-bg-color: #0e0e12;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,18,0.92);
      backdrop-filter: blur(16px);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cart-btn {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all .2s;
    }
    .cart-btn:active { transform: scale(.93); }
    .cart-count {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--accent2);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    /* ── Nav (categories) ────────────────────── */
    .categories-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 16px 20px;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar { display: none; }

    .cat-chip {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      white-space: nowrap;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .cat-chip:active { transform: scale(.94); }

    /* ── Page title ──────────────────────────── */
    .page-title {
      padding: 0 20px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .page-subtitle {
      color: var(--text2);
      font-size: .85rem;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Product grid ────────────────────────── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 0 16px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .product-card:active { transform: scale(.97); }
    .product-card.out-of-stock { opacity: .55; }

    .product-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }

    .product-body { padding: 12px; }
    .product-name {
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .product-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .product-stock {
      font-size: .72rem;
      margin-top: 4px;
    }
    .stock-ok { color: var(--success); }
    .stock-low { color: var(--warning); }
    .stock-out { color: var(--danger); }

    /* ── Product detail modal ────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 0 0 32px;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 12px auto 0;
    }
    .modal-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      margin: 16px 0;
    }
    .modal-img img { width: 100%; height: 100%; object-fit: cover; }
    .modal-content { padding: 0 20px; }
    .modal-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .modal-desc { color: var(--text2); font-size: .9rem; line-height: 1.6; margin-bottom: 16px; }
    .modal-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-price {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Qty selector */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      overflow: hidden;
    }
    .qty-btn {
      width: 40px; height: 40px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:active { background: var(--border); }
    .qty-val {
      min-width: 32px;
      text-align: center;
      font-weight: 600;
      font-size: .95rem;
    }

    .add-cart-btn {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .add-cart-btn:active { transform: scale(.97); }
    .add-cart-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* ── Cart panel ──────────────────────────── */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 300;
    }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed;
      top: 0; right: -100%;
      width: min(380px, 100vw);
      height: 100vh;
      background: var(--surface);
      z-index: 301;
      transition: right .3s ease;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
    }
    .cart-panel.open { right: 0; }
    .cart-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .close-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-emoji {
      font-size: 1.8rem;
      background: var(--surface2);
      border-radius: 10px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: .85rem; font-weight: 600; }
    .cart-item-price { font-size: .8rem; color: var(--accent); margin-top: 2px; }
    .cart-remove {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }
    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }
    .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    .cart-footer {
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .checkout-btn {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .checkout-btn:active { opacity: .85; }

    /* ── Checkout form ───────────────────────── */
    #checkout-view {
      display: none;
      padding: 0 20px;
    }
    #checkout-view.active { display: block; }
    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: .9rem;
      cursor: pointer;
      padding: 8px 0 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .order-summary-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin: 20px 0;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      margin-bottom: 8px;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1rem;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .confirm-btn {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--success), #18a558);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .confirm-btn:active { opacity: .85; }

    /* ── Success screen ──────────────────────── */
    #success-view {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    #success-view.active { display: block; }
    .success-icon {
      font-size: 4rem;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin: 16px 0 8px;
    }
    .success-msg { color: var(--text2); line-height: 1.6; }
    .order-ref {
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      margin: 20px auto;
      display: inline-block;
      font-family: monospace;
      font-size: .85rem;
      color: var(--accent);
    }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: .85rem;
      font-weight: 500;
      opacity: 0;
      transition: all .3s;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Catalogue view ──────────────────────── */
    #catalogue-view, #checkout-view, #success-view { width: 100%; }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════ -->
<header class="header">
  <span class="header-logo">◈ Boutique</span>
  <button class="cart-btn" onclick="openCart()">
    🛒
    <span class="cart-count" id="cart-count">0</span>
  </button>
</header>

<!-- ══ CATALOGUE VIEW ══════════════════════════ -->
<div id="catalogue-view">
  <!-- Categories chips -->
  <div class="categories-scroll" id="cats-bar"></div>

  <!-- Title -->
  <div class="page-title" id="page-title">
    Tous les produits
    <div class="page-subtitle" id="page-subtitle">Découvrez notre catalogue</div>
  </div>

  <!-- Grid -->
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- ══ CHECKOUT VIEW ═══════════════════════════ -->
<div id="checkout-view">
  <button class="back-btn" onclick="showCatalogue()">← Retour au catalogue</button>
  <div class="section-title">📦 Informations de livraison</div>

  <div class="form-group">
    <label class="form-label">Nom complet</label>
    <input class="form-input" id="f-name" placeholder="Jean Dupont" />
  </div>
  <div class="form-group">
    <label class="form-label">Adresse</label>
    <input class="form-input" id="f-address" placeholder="12 rue de la Paix" />
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Code postal</label>
      <input class="form-input" id="f-zip" placeholder="75001" />
    </div>
    <div class="form-group">
      <label class="form-label">Ville</label>
      <input class="form-input" id="f-city" placeholder="Paris" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Téléphone</label>
    <input class="form-input" id="f-phone" type="tel" placeholder="+33 6 12 34 56 78" />
  </div>

  <div class="section-title" style="margin-top:24px">🧾 Récapitulatif</div>
  <div class="order-summary-card">
    <div id="summary-items"></div>
    <div class="summary-total">
      <span>Total</span>
      <span id="summary-total-val"></span>
    </div>
  </div>

  <button class="confirm-btn" onclick="confirmOrder()">✅ Confirmer la commande</button>
</div>

<!-- ══ SUCCESS VIEW ════════════════════════════ -->
<div id="success-view">
  <div class="success-icon">🎉</div>
  <div class="success-title">Commande passée !</div>
  <p class="success-msg">Votre commande a été transmise.<br>Vous recevrez une confirmation sous peu.</p>
  <div class="order-ref" id="order-ref">ORD-XXXXXXXX</div>
  <button class="add-cart-btn" onclick="resetShop()" style="max-width:260px;margin:0 auto;display:block">
    Continuer mes achats
  </button>
</div>

<!-- ══ PRODUCT MODAL ═══════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-content">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-price-row">
        <div class="modal-price" id="modal-price"></div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qty-val">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div id="modal-stock"></div>
      <button class="add-cart-btn" id="add-cart-btn" onclick="addToCart()">Ajouter au panier</button>
    </div>
  </div>
</div>

<!-- ══ CART PANEL ══════════════════════════════ -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-title">
    🛒 Mon panier
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total-display">0,00 €</span>
    </div>
    <button class="checkout-btn" onclick="goCheckout()">Commander →</button>
  </div>
</div>

<!-- ══ TOAST ═══════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══ SCRIPTS ═════════════════════════════════ -->
<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

// ─── Data ────────────────────────────────────
const PRODUCTS_DATA = {
  "categories": [
    { "id": "all", "name": "Tout", "emoji": "✨" },
    { "id": "electronics", "name": "Électronique", "emoji": "📱" },
    { "id": "clothing", "name": "Vêtements", "emoji": "👗" },
    { "id": "food", "name": "Alimentation", "emoji": "🍎" },
    { "id": "home", "name": "Maison", "emoji": "🏠" }
  ],
  "products": [
    { "id":"p001","category":"electronics","name":"iPhone 15 Pro","desc":"256GB, Titanium Naturel. Puce A17 Pro.","price":1229.99,"stock":8,"emoji":"📱" },
    { "id":"p002","category":"electronics","name":"AirPods Pro 2","desc":"Réduction de bruit active, USB-C.","price":279.99,"stock":23,"emoji":"🎧" },
    { "id":"p003","category":"electronics","name":"Samsung Galaxy S24","desc":"128GB, Phantom Black. IA intégrée.","price":899.99,"stock":0,"emoji":"📲" },
    { "id":"p004","category":"electronics","name":"MacBook Air M3","desc":"13 pouces, 8GB RAM, 256GB SSD.","price":1299.99,"stock":5,"emoji":"💻" },
    { "id":"p005","category":"clothing","name":"Hoodie Premium","desc":"100% coton bio. Tailles S-XL.","price":59.99,"stock":42,"emoji":"👘" },
    { "id":"p006","category":"clothing","name":"Jean Slim Fit","desc":"Denim stretch, coupe moderne.","price":79.99,"stock":18,"emoji":"👖" },
    { "id":"p007","category":"clothing","name":"Sneakers Urban","desc":"Semelle air, coloris blanc/noir.","price":129.99,"stock":7,"emoji":"👟" },
    { "id":"p008","category":"food","name":"Panier Bio Semaine","desc":"Légumes & fruits de saison, 5kg.","price":34.99,"stock":15,"emoji":"🧺" },
    { "id":"p009","category":"food","name":"Café Grand Cru","desc":"Éthiopie Yirgacheffe, 500g, moulu.","price":18.99,"stock":50,"emoji":"☕" },
    { "id":"p010","category":"home","name":"Lampe Design LED","desc":"Intensité réglable, bras articulé.","price":89.99,"stock":12,"emoji":"💡" },
    { "id":"p011","category":"home","name":"Coussin Velours","desc":"45×45cm, plusieurs coloris.","price":24.99,"stock":30,"emoji":"🛋️" }
  ]
};

let currentCategory = 'all';
let cart = JSON.parse(localStorage.getItem('shop_cart') || '[]');
let currentProduct = null;
let currentQty = 1;

function saveCart() {
  localStorage.setItem('shop_cart', JSON.stringify(cart));
}

// ─── Catalogue ───────────────────────────────
function renderCategories() {
  const bar = document.getElementById('cats-bar');
  bar.innerHTML = '';
  PRODUCTS_DATA.categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'cat-chip' + (cat.id === currentCategory ? ' active' : '');
    chip.innerHTML = `${cat.emoji} ${cat.name}`;
    chip.onclick = () => setCategory(cat.id);
    bar.appendChild(chip);
  });
}

function setCategory(id) {
  currentCategory = id;
  renderCategories();
  renderProducts();
  const cat = PRODUCTS_DATA.categories.find(c => c.id === id);
  document.getElementById('page-title').childNodes[0].nodeValue = cat ? `${cat.emoji} ${cat.name}` : 'Boutique';
  document.getElementById('page-subtitle').textContent =
    id === 'all' ? 'Découvrez notre catalogue complet'
    : `Catégorie : ${cat?.name || ''}`;
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  const list = currentCategory === 'all'
    ? PRODUCTS_DATA.products
    : PRODUCTS_DATA.products.filter(p => p.category === currentCategory);

  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--text2);padding:20px;grid-column:span 2">Aucun produit.</p>';
    return;
  }
  list.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card' + (p.stock === 0 ? ' out-of-stock' : '');
    card.style.animationDelay = (i * 0.05) + 's';
    const stockLabel = p.stock === 0
      ? '<span class="stock-out">Rupture de stock</span>'
      : p.stock <= 5
        ? `<span class="stock-low">⚡ ${p.stock} restants</span>`
        : `<span class="stock-ok">✓ En stock</span>`;
    card.innerHTML = `
      <div class="product-img" style="font-size:2.8rem">${p.emoji}</div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price.toFixed(2)} €</div>
        <div class="product-stock">${stockLabel}</div>
      </div>`;
    card.onclick = () => openModal(p);
    grid.appendChild(card);
  });
}

// ─── Modal ───────────────────────────────────
function openModal(product) {
  currentProduct = product;
  currentQty = 1;
  document.getElementById('modal-img').innerHTML = `<span style="font-size:4rem">${product.emoji}</span>`;
  document.getElementById('modal-name').textContent = product.name;
  document.getElementById('modal-desc').textContent = product.desc;
  document.getElementById('modal-price').textContent = product.price.toFixed(2) + ' €';
  document.getElementById('qty-val').textContent = '1';
  const stockEl = document.getElementById('modal-stock');
  const btn = document.getElementById('add-cart-btn');
  if (product.stock === 0) {
    stockEl.innerHTML = '<p class="stock-out" style="margin-bottom:12px">❌ Rupture de stock</p>';
    btn.disabled = true;
    btn.textContent = 'Indisponible';
  } else {
    stockEl.innerHTML = `<p class="stock-ok" style="margin-bottom:12px">✓ ${product.stock} en stock</p>`;
    btn.disabled = false;
    btn.textContent = 'Ajouter au panier';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function changeQty(delta) {
  if (!currentProduct) return;
  currentQty = Math.max(1, Math.min(currentProduct.stock, currentQty + delta));
  document.getElementById('qty-val').textContent = currentQty;
}

function addToCart() {
  if (!currentProduct || currentProduct.stock === 0) return;
  const existing = cart.find(i => i.id === currentProduct.id);
  if (existing) {
    existing.qty = Math.min(currentProduct.stock, existing.qty + currentQty);
  } else {
    cart.push({ ...currentProduct, qty: currentQty });
  }
  saveCart();
  updateCartUI();
  document.getElementById('modal-overlay').classList.remove('open');
  showToast(`✅ ${currentProduct.name} ajouté !`);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

// ─── Cart ────────────────────────────────────
function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const countEl = document.getElementById('cart-count');
  countEl.textContent = count;
  countEl.style.display = count > 0 ? 'flex' : 'none';
  document.getElementById('cart-total-display').textContent = total.toFixed(2) + ' €';
  renderCartItems();
}

function renderCartItems() {
  const list = document.getElementById('cart-items-list');
  if (!cart.length) {
    list.innerHTML = '<div class="cart-empty"><div class="empty-icon">🛒</div><p>Votre panier est vide</p></div>';
    return;
  }
  list.innerHTML = cart.map(i => `
    <div class="cart-item">
      <div class="cart-item-emoji">${i.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-price">${(i.price * i.qty).toFixed(2)} € · x${i.qty}</div>
      </div>
      <button class="cart-remove" onclick="removeFromCart('${i.id}')">✕</button>
    </div>`).join('');
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  saveCart();
  updateCartUI();
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
  renderCartItems();
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

// ─── Checkout ────────────────────────────────
function goCheckout() {
  if (!cart.length) { showToast('⚠️ Panier vide !'); return; }
  closeCart();
  showCheckout();
}

function showCheckout() {
  document.getElementById('catalogue-view').style.display = 'none';
  document.getElementById('checkout-view').classList.add('active');
  document.getElementById('success-view').classList.remove('active');

  // Summary
  const items = document.getElementById('summary-items');
  items.innerHTML = cart.map(i =>
    `<div class="summary-item"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>${(i.price*i.qty).toFixed(2)} €</span></div>`
  ).join('');
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('summary-total-val').textContent = total.toFixed(2) + ' €';

  // Prefill with Telegram user data
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    document.getElementById('f-name').value = [u.first_name, u.last_name].filter(Boolean).join(' ');
  }
}

function showCatalogue() {
  document.getElementById('catalogue-view').style.display = 'block';
  document.getElementById('checkout-view').classList.remove('active');
  document.getElementById('success-view').classList.remove('active');
}

function confirmOrder() {
  const name    = document.getElementById('f-name').value.trim();
  const address = document.getElementById('f-address').value.trim();
  const zip     = document.getElementById('f-zip').value.trim();
  const city    = document.getElementById('f-city').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();

  if (!name || !address || !zip || !city || !phone) {
    showToast('⚠️ Veuillez remplir tous les champs');
    if (tg) tg.HapticFeedback?.notificationOccurred('error');
    return;
  }

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const orderPayload = {
    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
    delivery: { name, address, zip, city, phone },
    total: parseFloat(total.toFixed(2)),
  };

  // Send to bot via Telegram WebApp API
  if (tg) {
    tg.sendData(JSON.stringify(orderPayload));
  } else {
    // Dev fallback
    console.log('Order:', orderPayload);
    showSuccessView();
  }
}

function showSuccessView() {
  document.getElementById('catalogue-view').style.display = 'none';
  document.getElementById('checkout-view').classList.remove('active');
  document.getElementById('success-view').classList.add('active');
  const ts = Date.now().toString(36).toUpperCase();
  document.getElementById('order-ref').textContent = `ORD-${ts}`;
  cart = [];
  saveCart();
  updateCartUI();
}

function resetShop() {
  showCatalogue();
}

// ─── Toast ───────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Init ────────────────────────────────────
renderCategories();
renderProducts();
updateCartUI();

// Handle WebApp close event (tg.sendData triggers close automatically)
if (tg) {
  tg.onEvent('mainButtonClicked', () => {});
}
</script>
</body>
</html>
